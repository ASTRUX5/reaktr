<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>REAKTR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --green:  #31EC56;
        --pink:   #EF036C;
        --purple: #EE72F8;
        --bg:     #07070F;
        --bg2:    #0E0E1A;
        --glass:  rgba(255,255,255,0.06);
        --glass2: rgba(255,255,255,0.10);
        --border: rgba(255,255,255,0.10);
        --text:   #FFFFFF;
        --muted:  rgba(255,255,255,0.50);
        --nav-h:  72px;
      }
      html, body {
        background: var(--bg);
        color: var(--text);
        font-family: 'DM Sans', sans-serif;
        min-height: 100vh;
        overflow-x: hidden;
      }
      #root { min-height: 100vh; }
      ::-webkit-scrollbar { width: 3px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
      body::before {
        content: '';
        position: fixed; top: -200px; left: -200px;
        width: 500px; height: 500px;
        background: radial-gradient(circle, rgba(49,236,86,0.07) 0%, transparent 70%);
        pointer-events: none; z-index: 0;
      }
      body::after {
        content: '';
        position: fixed; bottom: -150px; right: -150px;
        width: 400px; height: 400px;
        background: radial-gradient(circle, rgba(238,114,248,0.07) 0%, transparent 70%);
        pointer-events: none; z-index: 0;
      }
      select option { background: #1a1a2e; color: #fff; }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(14px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
      .fade-up { animation: fadeUp 0.35s ease both; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
